<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WorldCuppy — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />
<link rel="stylesheet" href="styles.css" />
<style>
  body { display:grid; grid-template-columns: 1fr 1fr; min-height:100vh; }
  @media (max-width:840px){ body{ grid-template-columns:1fr; } .promo{ display:none !important; } }

  .promo { position:relative; overflow:hidden; padding: clamp(32px,4vw,52px); display:flex; flex-direction:column; color:#fff; }
  .promo .brand .wm { font-size:22px; } .promo .brand .ball{ border-color:#fff; }
  .promo .mid { margin-top:auto; }
  .promo h2 { font-size: clamp(30px,3.4vw,44px); line-height:.98; letter-spacing:-.02em; }
  .promo h2 .y { color: var(--gold); }
  .promo p { color:rgba(255,255,255,.85); font-size:16px; max-width:380px; margin-top:14px; }
  .promo .float2 { margin-top:28px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); border-radius:16px; padding:14px; backdrop-filter:blur(8px); max-width:360px; }
  .promo .fr { display:flex; align-items:center; gap:10px; padding:7px 6px; color:#fff; }
  .promo .fr .p { font-family:'Archivo'; font-weight:800; width:18px; color:rgba(255,255,255,.7); }
  .promo .fr .nm { flex:1; font-weight:700; display:flex; align-items:center; gap:8px; }
  .promo .fr .m { font-family:'Spline Sans Mono'; font-weight:700; }

  .formside { display:flex; align-items:center; justify-content:center; padding: clamp(28px,4vw,40px); }
  .formwrap { width:100%; max-width:380px; }
  .formwrap .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:26px; }
  .formwrap h1 { font-size:30px; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-family:'Archivo'; font-weight:600; font-size:13px; margin-bottom:6px; color:var(--ink-soft); }
  .field input {
    width:100%; height:46px; border:1px solid var(--line); border-radius:11px; background:var(--surface);
    padding:0 14px; font-family:'Hanken Grotesk'; font-size:15px; color:var(--ink); outline:none; transition:.15s;
  }
  .field input:focus { border-color:var(--grass); box-shadow:0 0 0 3px var(--grass-soft); }
  .divider-or { display:flex; align-items:center; gap:12px; margin:18px 0; color:var(--ink-faint); font-size:13px; }
  .divider-or::before, .divider-or::after { content:""; flex:1; height:1px; background:var(--line); }
  .g-btn { display:flex; align-items:center; justify-content:center; gap:10px; height:46px; width:100%; border:1px solid var(--line); border-radius:11px; background:var(--surface); font-family:'Archivo'; font-weight:700; font-size:14.5px; color:var(--ink); cursor:pointer; }
  .g-btn:hover { border-color:var(--ink-faint); }
  .switcher { text-align:center; margin-top:22px; font-size:14px; color:var(--ink-soft); }
  .switcher a { color:var(--grass-deep); font-weight:700; cursor:pointer; }
  .reg-only { display:none; }
  body.register .reg-only { display:block; }
</style>
</head>
<body>
  <!-- promo side -->
  <aside class="promo pitch-panel">
    <a class="brand" href="Landing.html"><span class="ball"></span><span class="wm">World<b>Cuppy</b></span></a>
    <div class="mid">
      <h2>Draft nations.<br>Win the <span class="y">pool</span>.</h2>
      <p>The 2026 World Cup draft is live. Sign in to make your picks before kickoff.</p>
      <div class="float2" id="float2"></div>
    </div>
  </aside>

  <!-- form side -->
  <main class="formside">
    <div class="formwrap">
      <div class="top">
        <a class="brand" href="Landing.html"><span class="ball"></span><span class="wm">World<b>Cuppy</b></span></a>
        <button class="icon-btn" id="t3" title="Theme"></button>
      </div>

      <h1 id="title">Welcome back</h1>
      <p class="muted" id="sub" style="margin:6px 0 24px">Sign in to your manager account.</p>

      <form onsubmit="event.preventDefault(); location.href='Home.html';">
        <div class="field reg-only">
          <label>Display name</label>
          <input type="text" placeholder="e.g. Nico" />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" placeholder="you@email.com" value="nico@lacueva.us" />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" placeholder="••••••••" value="password" />
        </div>
        <button class="btn btn-primary btn-block" type="submit" id="submit" style="margin-top:6px">Sign in</button>
      </form>

      <div class="divider-or">or</div>
      <button class="g-btn">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.2c0-.7-.1-1.4-.2-2H12v3.8h5.9c-.3 1.4-1 2.5-2.2 3.3v2.8h3.6c2.1-1.9 3.2-4.8 3.2-7.9z"/><path fill="#34A853" d="M12 23c2.9 0 5.4-1 7.2-2.6l-3.6-2.8c-1 .7-2.3 1.1-3.6 1.1-2.8 0-5.1-1.9-6-4.4H2.3v2.9C4.1 20.7 7.8 23 12 23z"/><path fill="#FBBC05" d="M6 14.3c-.2-.7-.4-1.4-.4-2.3s.1-1.6.4-2.3V6.8H2.3C1.5 8.3 1 10.1 1 12s.5 3.7 1.3 5.2L6 14.3z"/><path fill="#EA4335" d="M12 5.4c1.6 0 3 .5 4.1 1.6l3.1-3.1C17.4 2.1 14.9 1 12 1 7.8 1 4.1 3.3 2.3 6.8L6 9.7c.9-2.5 3.2-4.3 6-4.3z"/></svg>
        Continue with Google
      </button>

      <div class="switcher">
        <span id="switchText">New to WorldCuppy?</span>
        <a id="switchLink">Create an account</a>
      </div>
    </div>
  </main>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  const WC = window.WC;
  let mode = new URLSearchParams(location.search).get("mode") === "register" ? "register" : "login";

  function render(){
    document.body.classList.toggle("register", mode==="register");
    document.getElementById("title").textContent = mode==="register" ? "Join the pool" : "Welcome back";
    document.getElementById("sub").textContent = mode==="register" ? "Create your manager account in seconds." : "Sign in to your manager account.";
    document.getElementById("submit").textContent = mode==="register" ? "Create account" : "Sign in";
    document.getElementById("switchText").textContent = mode==="register" ? "Already have an account?" : "New to WorldCuppy?";
    document.getElementById("switchLink").textContent = mode==="register" ? "Sign in" : "Create an account";
  }
  render();
  document.getElementById("switchLink").addEventListener("click", ()=>{ mode = mode==="register"?"login":"register"; render(); });

  // theme
  function ticon(){ return document.documentElement.classList.contains("dark")
    ? `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>`
    : `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z"/></svg>`; }
  const tb = document.getElementById("t3"); tb.innerHTML = ticon();
  tb.addEventListener("click", ()=>{ const d=!document.documentElement.classList.contains("dark");
    document.documentElement.classList.toggle("dark",d); try{localStorage.setItem("wc_theme",d?"dark":"light")}catch(e){} tb.innerHTML=ticon(); });

  // promo standings
  document.getElementById("float2").innerHTML = WC.STANDINGS.slice(0,3).map((s,i)=>{
    const m = WC.mgr(s.mgr);
    return `<div class="fr"><span class="p">${i+1}</span><span class="nm"><span class="mdot m${s.mgr}"></span>${m.name}</span><span class="m">${WC.money(s.cents)}</span></div>`;
  }).join("");
</script>
</body>
</html>
