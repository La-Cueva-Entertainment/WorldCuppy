<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WorldCuppy — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />
<link rel="stylesheet" href="styles.css" />
<style>
  .home-grid { display:grid; grid-template-columns: 1fr 332px; gap: 22px; align-items:start; }
  @media (max-width: 940px){ .home-grid { grid-template-columns: 1fr; } }

  .hero {
    border-radius: var(--r-xl); padding: clamp(20px,3vw,30px); position:relative; overflow:hidden;
    display:grid; grid-template-columns: 1fr auto; gap: 18px; align-items:center;
  }
  .hero .rankbig { font-family:'Archivo'; font-weight:900; font-size: clamp(54px,9vw,84px); line-height:.82; letter-spacing:-.04em; }
  .hero .earn { font-family:'Spline Sans Mono'; font-weight:700; font-size: clamp(26px,4vw,38px); color: var(--gold); }
  .hero .teams { display:flex; gap:7px; margin-top:14px; flex-wrap:wrap; }
  .hero .teams .fi-rect { box-shadow: inset 0 0 0 1px rgba(255,255,255,.25), 0 2px 6px rgba(0,0,0,.3); }
  .hero-meta { text-align:right; }
  .hero .lbl { font-family:'Archivo'; font-weight:700; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.7); }

  .matches { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 620px){ .matches { grid-template-columns: 1fr; } }
  .match {
    background: var(--surface); border:1px solid var(--line); border-radius: var(--r-md); padding: 14px 15px;
    box-shadow: var(--shadow-sm);
  }
  .match .head { display:flex; justify-content:space-between; align-items:center; margin-bottom: 11px; }
  .match .head > * { white-space:nowrap; }
  .match .teamline { display:flex; align-items:center; gap:10px; padding: 4px 0; }
  .match .teamline .nm { font-weight:700; font-size:15px; flex:1; }
  .match .teamline.lose { opacity:.5; }
  .match .score { font-family:'Spline Sans Mono'; font-weight:700; font-size:18px; }
  .match .vs { font-size:13px; color:var(--ink-faint); font-weight:600; }
  .match .payouts { display:flex; flex-wrap:wrap; gap:6px; margin-top:11px; padding-top:11px; border-top:1px solid var(--line-soft); }

  .ldr-row { display:flex; align-items:center; gap:12px; padding: 9px 4px; border-bottom:1px solid var(--line-soft); }
  .ldr-row:last-child { border-bottom:0; }
  .ldr-row .pos { width:22px; font-family:'Archivo'; font-weight:800; color:var(--ink-faint); text-align:center; }
  .ldr-row.you { background: var(--grass-soft); border-radius:10px; padding-inline:10px; border-bottom-color:transparent; }
  .ldr-row .nm { font-weight:700; flex:1; }

  .news-item { padding: 12px 0; border-bottom:1px solid var(--line-soft); }
  .news-item:last-child { border-bottom:0; padding-bottom:0; }
  .news-item .t { font-family:'Archivo'; font-weight:700; font-size:14.5px; line-height:1.25; margin-top:5px; }
  .news-item .t:hover { color: var(--grass-deep); }
  .news-item .meta { font-size:12px; color:var(--ink-faint); margin-top:5px; }
</style>
</head>
<body>
<main class="page" data-screen-label="Home dashboard">
  <div class="wrap">

    <div class="between" style="margin-bottom:18px; flex-wrap:wrap; gap:10px">
      <div>
        <div class="kicker grass">Group Stage · Live</div>
        <h1 style="font-size:clamp(26px,4vw,34px); margin-top:4px; white-space:nowrap">World Cup 2026</h1>
      </div>
      <span class="badge hot"><span class="live-dot"></span> 2 matches today</span>
    </div>

    <div class="home-grid">
      <div class="grid" style="gap:26px">

        <!-- HERO: your standing -->
        <section class="hero pitch-panel">
          <div>
            <div class="lbl">Your position</div>
            <div style="display:flex; align-items:flex-end; gap:14px; margin-top:6px">
              <div class="rankbig">1<span style="font-size:.4em; vertical-align:.5em; font-weight:700">st</span></div>
              <div style="padding-bottom:10px">
                <div class="lbl" style="margin-bottom:2px">Earnings</div>
                <div class="earn">$81.75</div>
              </div>
            </div>
            <div class="teams" id="myTeams"></div>
          </div>
          <div class="hero-meta hide-sm">
            <div class="lbl">Lead over 2nd</div>
            <div style="font-family:'Spline Sans Mono';font-weight:700;font-size:24px;color:#fff">+$12.25</div>
            <a href="Standings.html" class="btn btn-gold btn-sm" style="margin-top:14px">Full standings →</a>
          </div>
        </section>

        <!-- TODAY -->
        <section>
          <div class="sec-head">
            <h2>Today's matches</h2>
            <a href="Standings.html" class="tag-soft" style="font-weight:700">Bracket →</a>
          </div>
          <div class="matches" id="matches"></div>
        </section>

        <!-- MINI STANDINGS -->
        <section class="card card-pad">
          <div class="sec-head" style="margin-bottom:6px">
            <h2 style="font-size:20px">Leaderboard</h2>
            <a href="Standings.html" class="tag-soft" style="font-weight:700">See all →</a>
          </div>
          <div id="leaderboard"></div>
        </section>
      </div>

      <!-- SIDEBAR -->
      <aside class="grid" style="gap:18px; position:sticky; top:80px">
        <section class="card card-pad">
          <div class="row" style="justify-content:space-between; margin-bottom:6px">
            <h2 style="font-size:18px">Football news</h2>
            <span class="badge"><span class="live-dot" style="background:var(--grass)"></span> RSS</span>
          </div>
          <div id="news"></div>
        </section>
      </aside>
    </div>
  </div>
</main>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  WCChrome.nav("Home", { admin: true });
  const WC = window.WC;

  // your teams (Nico = index 0)
  document.getElementById("myTeams").innerHTML =
    WC.OWNED[0].map(c => WC.flag(c, "xl")).join("");

  // today matches
  document.getElementById("matches").innerHTML = WC.TODAY.map(m => {
    const homeWin = m.played && (m.hs > m.as || m.pw === m.home);
    const awayWin = m.played && (m.as > m.hs || m.pw === m.away);
    const ho = WC.ownerOf(m.home), ao = WC.ownerOf(m.away);
    const payouts = [];
    if (m.played) {
      if (homeWin && ho !== null) payouts.push({ mgr: ho, amt: "+$5.00" });
      if (awayWin && ao !== null) payouts.push({ mgr: ao, amt: "+$5.00" });
    } else {
      if (ho !== null) payouts.push({ mgr: ho, amt: null });
      if (ao !== null) payouts.push({ mgr: ao, amt: null });
    }
    const teamline = (code, win, score) => `
      <div class="teamline ${m.played && !win ? 'lose' : ''}">
        ${WC.flag(code,'lg')}<span class="nm">${WC.TEAM[code].name}</span>
        ${m.played ? `<span class="score">${score}</span>` : ''}
      </div>`;
    return `<div class="match">
      <div class="head">
        <span class="kicker">${m.stage}</span>
        ${m.played ? `<span class="badge grass" style="height:20px">Final</span>`
                   : `<span class="tag-soft" style="font-weight:700">${m.time}</span>`}
      </div>
      ${teamline(m.home, homeWin, m.hs)}
      ${!m.played ? `<div class="vs" style="padding-left:40px">vs</div>` : ''}
      ${teamline(m.away, awayWin, m.as)}
      ${payouts.length ? `<div class="payouts">${payouts.map(p =>
        `<span class="m-chip m${p.mgr}"><span class="mdot"></span>${WC.mgr(p.mgr).name}${p.amt?` <b style="font-family:'Spline Sans Mono'">${p.amt}</b>`:''}</span>`
      ).join("")}</div>` : ''}
    </div>`;
  }).join("");

  // leaderboard (top 5)
  document.getElementById("leaderboard").innerHTML = WC.STANDINGS.slice(0,5).map((s,i) => {
    const m = WC.mgr(s.mgr);
    return `<div class="ldr-row ${m.you?'you':''}">
      <span class="pos">${i+1}</span>
      <span class="mdot m${s.mgr}"></span>
      <span class="nm">${m.name}${m.you?' <span class="tag-soft">(you)</span>':''}</span>
      <span class="money pos">${WC.money(s.cents)}</span>
    </div>`;
  }).join("");

  // news
  document.getElementById("news").innerHTML = WC.NEWS.slice(0,4).map(n => `
    <article class="news-item">
      <span class="badge ${n.tag==='Match'?'grass':n.tag==='Draft'?'gold':''}" style="height:20px">${n.tag}</span>
      <a class="t" href="News.html">${n.title}</a>
      <div class="meta">${n.src} · ${n.time} ago</div>
    </article>`).join("");
</script>
</body>
</html>
